<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Interactif — Jérémy Ribes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1117;
        --bg2: #161822;
        --card: #1c1f2e;
        --card-hover: #232740;
        --border: #2a2e42;
        --border-active: #4a6fa5;
        --text: #e2e4ec;
        --text-dim: #8b90a5;
        --text-muted: #5c6078;
        --accent: #4a9eff;
        --accent2: #36d6b5;
        --accent3: #f5a623;
        --accent4: #e85d75;
        --accent5: #a78bfa;
        --green-bg: rgba(54, 214, 181, 0.08);
        --blue-bg: rgba(74, 158, 255, 0.08);
        --orange-bg: rgba(245, 166, 35, 0.08);
        --red-bg: rgba(232, 93, 117, 0.08);
        --purple-bg: rgba(167, 139, 250, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        line-height: 1.55;
      }

      .app {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      /* ─── LEFT PANEL ─── */
      .panel-left {
        width: 340px;
        min-width: 300px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }

      .identity {
        padding: 28px 28px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .identity h1 {
        font-family: "DM Serif Display", serif;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: -0.5px;
        margin-bottom: 2px;
      }

      .identity .role {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent2);
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin-bottom: 2px;
      }

      .identity .role2 {
        font-size: 13px;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.5px;
        margin-bottom: 14px;
      }

      .contact-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        font-size: 13px;
        color: var(--text-dim);
      }

      .contact-row span {
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }

      .contact-row .ic {
        font-size: 11px;
        opacity: 0.6;
      }

      /* Intro strip */
      .intro-strip {
        padding: 16px 28px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: linear-gradient(
          135deg,
          rgba(74, 158, 255, 0.03),
          rgba(54, 214, 181, 0.03)
        );
      }

      .intro-strip p {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
      }

      /* KPI bar */
      .kpi-bar {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg2);
      }

      .kpi-item {
        flex: 1;
        text-align: center;
        padding: 12px 8px;
        border-right: 1px solid var(--border);
      }

      .kpi-item:last-child {
        border-right: none;
      }

      .kpi-value {
        font-family: "JetBrains Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        color: var(--accent3);
      }

      .kpi-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-top: 2px;
      }

      /* Navigation */
      .nav-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
      }

      .nav-list::-webkit-scrollbar {
        width: 4px;
      }
      .nav-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .nav-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 28px;
        cursor: pointer;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }

      .nav-item:hover {
        background: var(--card);
      }

      .nav-item.active {
        background: var(--card);
        border-left-color: var(--accent);
      }

      .nav-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .nav-label {
        font-size: 15px;
        font-weight: 600;
      }

      .nav-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      .nav-divider {
        height: 1px;
        background: var(--border);
        margin: 8px 28px;
      }

      /* ─── RIGHT PANEL ─── */
      .panel-right {
        flex: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg2);
        overflow: hidden;
      }

      .content-head {
        padding: 20px 32px 16px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: baseline;
        gap: 16px;
      }

      .content-head h2 {
        font-family: "DM Serif Display", serif;
        font-size: 24px;
        font-weight: 400;
      }

      .content-head .badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 4px 10px;
        border-radius: 4px;
      }

      .content-body {
        flex: 1;
        padding: 24px 32px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .content-body::-webkit-scrollbar {
        width: 5px;
      }
      .content-body::-webkit-scrollbar-track {
        background: transparent;
      }
      .content-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* Cards */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px 22px;
      }

      .card-sm {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 18px;
      }

      .card-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .card-title .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .card-text {
        font-size: 15px;
        line-height: 1.6;
        color: var(--text);
      }

      .card-text.dim {
        color: var(--text-dim);
        font-size: 14px;
      }

      /* Grid layouts */
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }

      /* Competence pill */
      .comp-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        border-left: 3px solid transparent;
        transition: all 0.15s;
        overflow: hidden;
      }

      .comp-card:hover {
        border-color: var(--border-active);
        background: var(--card-hover);
      }

      .comp-card.is-open {
        border-color: var(--border-active);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0)
        );
      }

      .comp-trigger {
        width: 100%;
        border: none;
        background: transparent;
        color: inherit;
        text-align: left;
        padding: 16px 18px;
        cursor: pointer;
        display: block;
        font: inherit;
      }

      .comp-trigger:hover {
        background: rgba(255, 255, 255, 0.015);
      }

      .comp-trigger:focus-visible {
        outline: 2px solid var(--border-active);
        outline-offset: -2px;
      }

      .comp-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .comp-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .comp-chevron {
        font-size: 14px;
        line-height: 1;
        color: var(--text-muted);
        transition: transform 0.18s ease, color 0.18s ease;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .comp-card.is-open .comp-chevron {
        transform: rotate(180deg);
        color: var(--text-dim);
      }

      .comp-desc {
        font-size: 13px;
        line-height: 1.55;
        color: var(--text-dim);
      }

      .comp-meta {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .comp-tag {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 3px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .comp-details {
        padding: 0 18px 18px 18px;
        border-top: 1px solid var(--border);
      }

      .comp-detail-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .comp-detail-block {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
      }

      .comp-detail-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.9px;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .comp-detail-text {
        font-size: 13px;
        line-height: 1.6;
        color: var(--text);
      }

      /* Timeline */
      .timeline-item {
        position: relative;
        padding-left: 24px;
        padding-bottom: 6px;
      }

      .timeline-item::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 10px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        background: var(--bg2);
      }

      .timeline-item::after {
        content: "";
        position: absolute;
        left: 9px;
        top: 22px;
        width: 2px;
        bottom: 0;
        background: var(--border);
      }

      .timeline-item:last-child::after {
        display: none;
      }

      .tl-header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 6px;
      }

      .tl-role {
        font-size: 16px;
        font-weight: 700;
      }

      .tl-company {
        font-size: 14px;
        font-weight: 600;
        color: var(--accent2);
      }

      .tl-date {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text-muted);
        margin-left: auto;
        white-space: nowrap;
      }

      .tl-bullets {
        list-style: none;
        padding: 0;
      }

      .tl-bullets li {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-dim);
        padding: 3px 0;
        padding-left: 16px;
        position: relative;
      }

      .tl-bullets li::before {
        content: "›";
        position: absolute;
        left: 0;
        color: var(--accent);
        font-weight: 700;
        font-size: 16px;
        top: 1px;
      }

      /* Realisation highlight */
      .real-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 18px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .real-icon {
        font-size: 18px;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .real-text {
        font-size: 14px;
        line-height: 1.55;
        color: var(--text);
      }

      /* Tag row */
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        padding: 5px 12px;
        border-radius: 5px;
        white-space: nowrap;
      }

      .tag-green {
        background: var(--green-bg);
        color: var(--accent2);
        border: 1px solid rgba(54, 214, 181, 0.15);
      }
      .tag-blue {
        background: var(--blue-bg);
        color: var(--accent);
        border: 1px solid rgba(74, 158, 255, 0.15);
      }
      .tag-orange {
        background: var(--orange-bg);
        color: var(--accent3);
        border: 1px solid rgba(245, 166, 35, 0.15);
      }
      .tag-red {
        background: var(--red-bg);
        color: var(--accent4);
        border: 1px solid rgba(232, 93, 117, 0.15);
      }
      .tag-purple {
        background: var(--purple-bg);
        color: var(--accent5);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }

      /* Section label */
      .section-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: var(--text-muted);
        margin-bottom: 10px;
      }

      /* Project card */
      .project-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 22px 24px;
        border-top: 3px solid var(--accent5);
      }

      .project-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .project-sub {
        font-size: 13px;
        color: var(--accent5);
        font-weight: 500;
        margin-bottom: 12px;
      }

      /* Formation */
      .formation-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .formation-year {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        font-weight: 700;
        color: var(--accent3);
      }

      .formation-title {
        font-size: 16px;
        font-weight: 600;
      }

      .formation-sub {
        font-size: 13px;
        color: var(--text-dim);
      }

      /* Punchline */
      .punchline-box {
        background: linear-gradient(
          135deg,
          rgba(74, 158, 255, 0.06),
          rgba(54, 214, 181, 0.06)
        );
        border: 1px solid rgba(54, 214, 181, 0.15);
        border-radius: 10px;
        padding: 20px 24px;
        text-align: center;
      }

      .punchline-box p {
        font-family: "DM Serif Display", serif;
        font-size: 17px;
        color: var(--accent2);
        font-style: italic;
        line-height: 1.6;
      }

      /* Tool detail cards */
      .tool-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        transition: all 0.15s;
      }

      .tool-card + .tool-card {
        margin-top: 12px;
      }

      .tool-summary {
        padding: 18px 20px;
        cursor: pointer;
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }

      .tool-summary:hover {
        background: var(--card-hover);
      }

      .tool-mark {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex-shrink: 0;
        border: 1px solid transparent;
      }

      .tool-main {
        flex: 1;
      }

      .tool-topline {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }

      .tool-title {
        font-size: 16px;
        font-weight: 700;
      }

      .tool-category {
        font-size: 13px;
        color: var(--text-dim);
        font-weight: 500;
      }

      .tool-status {
        margin-left: auto;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: var(--text-muted);
      }

      .tool-summary-text {
        font-size: 14px;
        line-height: 1.55;
        color: var(--text);
      }

      .tool-details {
        padding: 0 20px 18px 20px;
        border-top: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.01),
          rgba(255, 255, 255, 0)
        );
      }

      .tool-detail-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      .detail-block {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
      }

      .detail-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 7px;
      }

      .detail-text {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
      }

      @media (max-width: 900px) {
        .panel-left {
          width: 100%;
          min-width: unset;
          border-right: none;
          border-bottom: 1px solid var(--border);
          height: 40vh;
        }
        .panel-right {
          height: 60vh;
        }
        .app {
          flex-direction: column;
        }
        .grid-2 {
          grid-template-columns: 1fr;
        }
        .grid-3 {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app" id="app"></div>

      function bindEvents() {
        document.querySelectorAll(".nav-item").forEach((el) => {
          el.addEventListener("click", () => {
            activeSection = el.dataset.section;
            render();
          });
        });

        document.querySelectorAll(".tool-summary").forEach((el) => {
          el.addEventListener("click", () => {
            const toolId = el.dataset.tool;
            expandedTool = expandedTool === toolId ? null : toolId;
            render();
          });
        });

        document.querySelectorAll(".comp-trigger").forEach((el) => {
          el.addEventListener("click", () => {
            const compId = el.dataset.competence;
            expandedCompetence =
              expandedCompetence === compId ? null : compId;
            render();
          });
        });
      }

      render();
    </script>
