        <h1>Jérémy Ribes</h1>
        <p><strong>Manager de Proximité — Coordinateur de la Performance Commerciale & Appui à la Décision</strong></p>
        <p>Montferrier-sur-Lez (34) · Né le 24 juin 1991</p>
        <p>Professionnel de terrain · 13 ans en environnement commercial · J'interviens là où l'activité manque de lisibilité ou de coordination, pour la rendre plus fluide, pilotable et durable.</p>

        <h2>Compétences clés</h2>
        <p>Pilotage commercial · Organisation & méthodes · Outils d'aide à la décision · Interface & coordination · Management par l'utilité · Suivi & reporting · Cadrage & priorisation</p>

        <h2>Résultats marquants</h2>
        <p>+83 % de CA et +5,6 points de marge en 2 mois dans un magasin en perte de vitesse.</p>

        <h2>Expériences</h2>
        <h3>Opticien collaborateur — Krys (2025 → aujourd'hui)</h3>
        <p>Normalisation opérationnelle, pilotage quotidien, interface opérationnelle, développement d'outils Desktop et Web d'aide à la vente.</p>

        <h3>Responsable de magasin — Générale d'Optique (2024 → 2025)</h3>
        <p>Pilotage commercial et organisationnel du point de vente. Management de proximité et coordination terrain/direction.</p>

        <h3>Opticien collaborateur — GrandOptical · Krys · Lissac (2012 → 2023)</h3>
        <p>Relation client, vente conseil. Évolution progressive vers l'organisation et l'amélioration du fonctionnement quotidien.</p>

        <h2>Outils conçus</h2>
        <p><strong>Opti'Profit</strong> — Aide à la décision commerciale (Google Apps Script). Identification du meilleur mix produit en temps réel.</p>
        <p><strong>DeV'Flow</strong> — Solution SaaS de pilotage de la concrétisation commerciale (en développement).</p>
        <p><strong>Brief'Maker</strong> — Support de brief connecté pour la coordination quotidienne.</p>
        <p><strong>Gestionnaire de Planning</strong> — Optimisation des ressources selon le flux d'activité.</p>

        <h2>Formation</h2>
        <p>BTS Opticien Lunetier — 2012</p>
