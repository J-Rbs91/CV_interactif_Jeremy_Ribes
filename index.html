        <h1>J&eacute;r&eacute;my Ribes</h1>
        <p><strong>Coordinateur de la Performance Commerciale</strong></p>
        <p>
          Outils m&eacute;tiers | Appui &agrave; la D&eacute;cision | Pilotage
          terrain | Structuration de l'activit&eacute;
        </p>
        <p>Montferrier-sur-Lez (34) · N&eacute; le 24 juin 1991</p>
        <p>
          Professionnel de terrain avec 13 ans d&rsquo;exp&eacute;rience en
          environnement commercial, j&rsquo;ai progressivement orient&eacute;
          mon parcours vers ce qui me mobilise le plus : concevoir des outils
          concrets pour fiabiliser les d&eacute;cisions, structurer
          l&rsquo;activit&eacute; et fluidifier le travail au quotidien.
        </p>

        <h2>Profil</h2>
        <p>
          &laquo; Le pivot de la performance collective : rendre une
          activit&eacute; plus lisible, plus fluide et plus pilotable, sans la
          rigidifier. &raquo;
        </p>
        <p>
          J&rsquo;ai progressivement d&eacute;plac&eacute; ma valeur du face
          &agrave; face client vers l&rsquo;organisation de l&rsquo;activit&eacute;
          : outils d&rsquo;aide &agrave; la vente, suivi des dossiers,
          planning, proc&eacute;dures et rep&egrave;res de pilotage.
        </p>
        <p>
          Positionnement : interface entre la direction, qui porte les
          objectifs strat&eacute;giques, et le terrain, qui exprime les besoins
          op&eacute;rationnels r&eacute;els.
        </p>
        <p>
          M&eacute;thode : structurer sans alourdir, outiller sans compliquer,
          faire adopter en d&eacute;montrant l&rsquo;utilit&eacute;
          concr&egrave;te &agrave; partir d&rsquo;un irritant r&eacute;el.
        </p>
        <p>
          Expertise cl&eacute; : cr&eacute;er des outils et des cadres de
          travail qui am&eacute;liorent la d&eacute;cision, la coordination et
          la performance collective.
        </p>
        <p>
          Ce que j&rsquo;apporte : structuration, aide &agrave; la
          d&eacute;cision, utilit&eacute; terrain, pilotage factuel,
          coordination, adh&eacute;sion.
        </p>
        <p>
          Ce que je vise : un r&ocirc;le transverse o&ugrave; je peux prendre en
          charge la structuration d&rsquo;une activit&eacute; existante,
          fluidifier les interfaces entre &eacute;quipes et installer des outils
          utiles &agrave; l&rsquo;ex&eacute;cution comme &agrave; la
          d&eacute;cision.
        </p>

        <h2>Comp&eacute;tences cl&eacute;s</h2>
        <ul>
          <li>
            <strong>Pilotage commercial :</strong> d&eacute;velopper le flux
            clients tout en s&eacute;curisant la rentabilit&eacute; de chaque
            vente. R&eacute;sultat marquant : +83 % de chiffre d&rsquo;affaires
            et +5,64 points de marge en 2 mois.
          </li>
          <li>
            <strong>Organisation &amp; m&eacute;thodes :</strong> mettre en
            place des processus de travail clairs pour rendre l&rsquo;activit&eacute;
            plus lisible et r&eacute;duire les pertes de temps.
          </li>
          <li>
            <strong>Outils d'aide &agrave; la d&eacute;cision :</strong>
            concevoir des outils simples pour fiabiliser les choix de
            l&rsquo;&eacute;quipe et acc&eacute;l&eacute;rer la bonne
            d&eacute;cision.
          </li>
          <li>
            <strong>Interface &amp; coordination :</strong> faire le lien entre
            direction, contraintes op&eacute;rationnelles et r&eacute;alit&eacute;
            du terrain.
          </li>
          <li>
            <strong>Management par l'utilit&eacute; :</strong> faire
            adh&eacute;rer au changement en d&eacute;montrant l&rsquo;int&eacute;r&ecirc;t
            imm&eacute;diat des outils et des m&eacute;thodes.
          </li>
          <li>
            <strong>Suivi &amp; reporting :</strong> rendre visibles les

          </li>
          <li>
            <strong>Cadrage &amp; s&eacute;curisation des d&eacute;cisions :</strong>

            techniques en r&egrave;gles explicites, prioris&eacute;es, testables et
            directement exploitables par les &eacute;quipes.
          </li>
        </ul>

        <h2>R&eacute;alisations marquantes</h2>
        <p>

        <ul>
